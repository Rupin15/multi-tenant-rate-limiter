server:
  port: 8080

spring:

  application:
    name: ${SPRING_APPLICATION_NAME:api-gateway}

  jackson:
    time-zone: UTC

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: payment-gateway
              uri: ${SPRING_PAYMENT_URL:http://localhost:8081}
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=2
                - PrefixPath=/v1/payments

            - id: order-gateway
              uri: ${SPRING_ORDER_URL:http://localhost:8082}
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=2
                - PrefixPath=/v1/orders

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rate_limiter}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway

  endpoint:
    prometheus:
      enabled: true
    gateway:
      enabled: true
    metrics:
      enabled: true

rate-limiter:
  redis:
    topic: update-policy