services:

  redis:
    image: redis:latest
    container_name: rate-limiter-redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15

    networks:
      - rate-limiter

  postgres-policy:
    image: postgres:16
    container_name: postgres-policy

    environment:
      POSTGRES_DB: rate_limiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limiter"]
      interval: 10s
      timeout: 10s
      retries: 10

    networks:
      - rate-limiter

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: payment-service

    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

    expose:
      - "8080"
      - "9091"

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9091/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 12

    networks:
      - rate-limiter

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: order-service

    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

    expose:
      - "8080"
      - "9091"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12

    networks:
      - rate-limiter

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway

    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 10s
      SPRING_DATA_REDIS_LETTUCE_SHUTDOWN_TIMEOUT: 10s
      RATE_LIMITER_CONFIG_SERVER_BASE_URL: http://configuration-server:8085/internal/config/rate-limit-policies
      SPRING_PAYMENT_URL: http://payment-service:8080
      SPRING_ORDER_URL: http://order-service:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

    depends_on:
      redis:
        condition: service_healthy

      postgres-policy:
        condition: service_healthy

      configuration-server:
        condition: service_healthy

      payment-service:
        condition: service_healthy

      order-service:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9091/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 12

    expose:
      - "8080"
      - "9091"

    networks:
      - rate-limiter

  configuration-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: configuration-server

    container_name: rate-limiter-configuration-server

    ports:
      - "8085:8085"
      - "9094:9094"

    environment:
      SPRING_APPLICATION_NAME: configuration-server
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-policy:5432/rate_limiter?options=-c%20TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

    depends_on:
      redis:
        condition: service_healthy
      postgres-policy:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9094/actuator/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 12

    networks:
      - rate-limiter

  nginx:
    image: nginx:latest
    container_name: rate-limiter-nginx

    ports:
      - "8084:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - api-gateway

    networks:
      - rate-limiter

  prometheus:
    image: prom/prometheus:latest
    container_name: rate-limiter-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    networks:
      - rate-limiter

  grafana:
    image: grafana/grafana:latest
    container_name: rate-limiter-grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

    depends_on:
      - prometheus

    networks:
      - rate-limiter

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rate-limiter-jaeger

    ports:
      - "16686:16686"
      - "4318:4318"

    networks:
      - rate-limiter

networks:
  rate-limiter:
    name: rate-limiter

volumes:
  postgres_data:
